<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cansu & Daniel — 11 Octubre 2026 — Mas de Sant Lleí, Barcelona" />
  <title>Cansu &amp; Daniel — 11 · X · 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Prevent intro flash on return visits — runs before first paint -->
  <script>if (sessionStorage.getItem('introSeen')) document.documentElement.classList.add('intro-skip');</script>

  <!-- Very subtle lace border frame — fixed, decorative only -->
  <div class="page-lace-border" aria-hidden="true"></div>

  <!-- ── Intro Envelope Overlay ── -->
  <div id="introOverlay" class="intro-overlay" role="dialog" aria-modal="true" aria-label="Wedding invitation">
    <div class="intro-scene">
      <div
        class="intro-envelope"
        id="introEnvelope"
        role="button"
        tabindex="0"
        aria-label="Open the invitation"
      >
        <!-- Envelope body — cream/warm white with lace edge -->
        <div class="env-body" aria-hidden="true">
          <div class="env-lace" aria-hidden="true"></div>
        </div>

        <!-- Portrait photo — rises from envelope on open -->
        <div class="env-card" aria-hidden="true">
          <img src="assets/venue-4.jpeg" alt="Cansu &amp; Daniel" class="env-card-photo" />
        </div>

        <!-- Triangular flap — rotates backward on open -->
        <div class="env-flap-wrap" aria-hidden="true">
          <div class="env-flap" id="envFlap"></div>
        </div>

        <!-- Face: wax seal + names + hint -->
        <div class="env-face">
          <div class="env-seal" aria-hidden="true">
            <span class="env-seal-text">C · D</span>
          </div>
          <h2 class="env-title">Cansu &amp; Daniel</h2>
          <p class="env-dateline">11 · X · 2026</p>
          <p class="env-hint" id="envHint"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Language Switcher -->
  <nav class="lang-switcher" aria-label="Language selector">
    <button class="lang-btn active" data-lang="es" aria-current="true">ES</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="de">DE</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="tr">TR</button>
  </nav>

  <main>

    <!-- ── Hero ── -->
    <section id="hero" class="hero" aria-label="Hero">
      <div class="hero-inner">

        <p class="hero-eyebrow animate-in" data-i18n="hero.eyebrow"></p>

        <!-- Monogram — ornamental embossed crest -->
        <div class="hero-monogram" aria-hidden="true">
          <div class="hero-monogram-crest">
            <svg class="hero-crest-frame" viewBox="0 0 240 200" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" overflow="visible" aria-hidden="true">
              <!-- Outer diamond frame -->
              <path d="M120 10 L228 100 L120 190 L12 100 Z" stroke-width="0.7"/>
              <!-- Inner diamond frame -->
              <path d="M120 24 L214 100 L120 176 L26 100 Z" stroke-width="0.4"/>
              <!-- Top ornament -->
              <path d="M113 13 C110 8 107 10 109 14" stroke-width="0.6"/>
              <path d="M127 13 C130 8 133 10 131 14" stroke-width="0.6"/>
              <path d="M117 9 L120 5 L123 9" stroke-width="0.65"/>
              <circle cx="120" cy="4.5" r="1.3" fill="currentColor" stroke="none"/>
              <!-- Bottom ornament -->
              <path d="M113 187 C110 192 107 190 109 186" stroke-width="0.6"/>
              <path d="M127 187 C130 192 133 190 131 186" stroke-width="0.6"/>
              <path d="M117 191 L120 195 L123 191" stroke-width="0.65"/>
              <circle cx="120" cy="195.5" r="1.3" fill="currentColor" stroke="none"/>
              <!-- Right ornament -->
              <path d="M225 94 C231 91 231 88 226 89" stroke-width="0.6"/>
              <path d="M225 106 C231 109 231 112 226 111" stroke-width="0.6"/>
              <path d="M230 97 L234 100 L230 103" stroke-width="0.65"/>
              <circle cx="235.5" cy="100" r="1.3" fill="currentColor" stroke="none"/>
              <!-- Left ornament -->
              <path d="M15 94 C9 91 9 88 14 89" stroke-width="0.6"/>
              <path d="M15 106 C9 109 9 112 14 111" stroke-width="0.6"/>
              <path d="M10 97 L6 100 L10 103" stroke-width="0.65"/>
              <circle cx="4.5" cy="100" r="1.3" fill="currentColor" stroke="none"/>
              <!-- Midpoint accent dots on each side -->
              <circle cx="174" cy="55" r="1" fill="currentColor" stroke="none" opacity="0.5"/>
              <circle cx="66"  cy="55" r="1" fill="currentColor" stroke="none" opacity="0.5"/>
              <circle cx="174" cy="145" r="1" fill="currentColor" stroke="none" opacity="0.5"/>
              <circle cx="66"  cy="145" r="1" fill="currentColor" stroke="none" opacity="0.5"/>
            </svg>
            <span class="hero-monogram-text">C · D</span>
          </div>
        </div>

        <div class="hero-content">
          <div class="hero-rule animate-in delay-1" aria-hidden="true"></div>
          <h1 class="hero-names animate-in delay-2">
            <span class="name-first">Cansu</span>
            <span class="name-amp" aria-hidden="true">&amp;</span>
            <span class="name-second">Daniel</span>
          </h1>
          <div class="hero-rule animate-in delay-3" aria-hidden="true"></div>
          <p class="hero-date animate-in delay-4">
            <time datetime="2026-10-11">11 · X · 2026</time>
          </p>
          <p class="hero-location animate-in delay-5">Mas de Sant Lleí · Barcelona</p>
        </div>
      </div>
      <a href="#countdown" class="hero-scroll" aria-label="Scroll to countdown">
        <span class="hero-scroll-line" aria-hidden="true"></span>
      </a>
    </section>

    <!-- ── Intro Prose ── -->
    <section id="intro" class="section section-intro fade-in">
      <div class="container container--narrow">
        <div class="intro-prose">
          <p data-i18n="intro.p1"></p>
          <p data-i18n="intro.p2"></p>
          <p data-i18n="intro.p3"></p>
        </div>
      </div>
    </section>

    <!-- ── Countdown ── -->
    <section id="countdown" class="section section-warm fade-in">
      <div class="container">
        <header class="section-header">
          <span class="section-label" data-i18n="countdown.label"></span>
          <h2 class="section-title" data-i18n="countdown.title"></h2>
        </header>
        <div class="countdown-grid" aria-live="polite" aria-atomic="true">
          <div class="countdown-item">
            <span class="countdown-num" id="cd-days">560</span>
            <span class="countdown-unit" data-i18n="countdown.days"></span>
          </div>
          <div class="countdown-sep" aria-hidden="true">·</div>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-hours">00</span>
            <span class="countdown-unit" data-i18n="countdown.hours"></span>
          </div>
          <div class="countdown-sep" aria-hidden="true">·</div>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-minutes">00</span>
            <span class="countdown-unit" data-i18n="countdown.minutes"></span>
          </div>
          <div class="countdown-sep" aria-hidden="true">·</div>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-seconds">00</span>
            <span class="countdown-unit" data-i18n="countdown.seconds"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Program ── -->
    <section id="program" class="section fade-in">
      <div class="container">
        <header class="section-header">
          <span class="section-label" data-i18n="program.label"></span>
          <h2 class="section-title" data-i18n="program.title"></h2>
        </header>
        <div class="timeline" id="timeline" role="list">
          <!-- Built by script.js -->
        </div>
      </div>
    </section>

    <!-- ── Location ── -->
    <section id="location" class="section section-warm fade-in">

      <!-- Photo slideshow background (populated by script.js) -->
      <div class="slideshow-bg" id="locationSlideshow" aria-hidden="true">
        <div class="slideshow-overlay"></div>
      </div>

      <div class="container">
        <header class="section-header">
          <span class="section-label" data-i18n="location.label"></span>
          <h2 class="section-title" data-i18n="location.title"></h2>
        </header>
        <div class="location-layout">
          <div class="location-info">
            <h3 class="location-venue">Mas de Sant Lleí</h3>
            <p class="location-address" data-i18n="location.address"></p>
            <a
              class="location-link"
              href="https://maps.google.com/?q=Mas+de+Sant+Llei+Barcelona"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="location.directions"
            ></a>
          </div>
          <div class="map-wrapper">
            <!--
              Replace the src below with your own embed code:
              Google Maps → find the venue → Share → Embed a map → copy src URL
            -->
            <iframe
              src="https://maps.google.com/maps?q=Mas+de+Sant+Llei+Barcelona&output=embed"
              title="Mas de Sant Lleí location"
              loading="lazy"
              allowfullscreen
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Accommodation ── -->
    <section id="accommodation" class="section fade-in">
      <div class="container container--narrow">
        <header class="section-header">
          <span class="section-label" data-i18n="accommodation.label"></span>
          <h2 class="section-title" data-i18n="accommodation.title"></h2>
        </header>
        <p class="section-prose" data-i18n="accommodation.body"></p>
      </div>
    </section>

    <!-- ── Transport ── -->
    <section id="transport" class="section section-warm fade-in">
      <div class="container container--narrow">
        <header class="section-header">
          <span class="section-label" data-i18n="transport.label"></span>
          <h2 class="section-title" data-i18n="transport.title"></h2>
        </header>
        <p class="section-prose" data-i18n="transport.body"></p>
      </div>
    </section>

    <!-- ── FAQ ── -->
    <section id="faq" class="section fade-in">
      <div class="container container--narrow">
        <header class="section-header">
          <span class="section-label" data-i18n="faq.label"></span>
          <h2 class="section-title" data-i18n="faq.title"></h2>
        </header>
        <div class="faq-list" id="faqList">
          <!-- Built by script.js -->
        </div>
      </div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer fade-in">
    <div class="footer-inner">
      <p class="footer-names">Cansu &amp; Daniel</p>
      <p class="footer-date">11 · X · 2026</p>
      <p class="footer-closing" data-i18n="footer.closing"></p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
